<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-card {
            background: white;
            padding: 40px;
            border-radius: 14px;
            width: 360px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.25);
        }
        .auth-card h2 {
            text-align: center;
            margin-bottom: 25px;
        }
        .auth-card input {
            width: 100%;
            padding: 12px;
            margin-bottom: 14px;
            border-radius: 6px;
            border: 1px solid #ddd;
            font-size: 14px;
        }
        .auth-card button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
        }
        .auth-card button:hover {
            background: #5a67d8;
        }
        .auth-card .error {
            color: red;
            margin-bottom: 15px;
            text-align: center;
        }
        .auth-card a {
            display: block;
            margin-top: 15px;
            text-align: center;
            color: #555;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="auth-card">
    <h2>Welcome Back</h2>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <input type="email" name="email" placeholder="Email address" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <a href="{% url 'register' %}">Don’t have an account? Register</a>
</div>

</body>
</html>
